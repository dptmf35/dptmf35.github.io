# ==============================================================================
# Site Settings
# ==============================================================================
locale                   : "ko-KR"
title                    : "Research Archive"
title_separator          : "-"
subtitle                 : "Robotics & AI Paper Reviews"
name                     : "Yeseul Jeong"
description              : "로보틱스와 인공지능 논문을 읽고 정리하는 개인 공부 아카이브"
url                      : "https://dptmf35.github.io"
baseurl                  : ""
repository               : "dptmf35/dptmf35.github.io"
words_per_minute         : 200

# 테마 (GitHub Pages에서 gem 대신 remote_theme 사용)
remote_theme             : "mmistakes/minimal-mistakes@4.26.2"
minimal_mistakes_skin    : "default" # "air", "aqua", "contrast", "dark", "dirt", "neon", "mint", "plum", "sunrise"

# ------------------------------------------------------------------------------
# Search
# ------------------------------------------------------------------------------
search                   : true
search_full_content      : true
search_provider          : lunr
lunr:
  search_within_pages    : true

# ==============================================================================
# Author (사이드바 프로필)
# ==============================================================================
author:
  name             : "Yeseul Jeong"
  avatar           : # "/assets/images/avatar.png"  # 원하는 프로필 이미지 경로
  bio              : "Robotics & AI 논문을 읽고 기록합니다."
  location         : "Seoul, Korea"
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dptmf35"
    - label: "Email"
      icon: "fas fa-fw fa-envelope"
      url: "mailto:yeseuljeong77@gmail.com"

# ==============================================================================
# Site Footer
# ==============================================================================
footer:
  links:
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/dptmf35"

# ==============================================================================
# Reading Files
# ==============================================================================
include:
  - _pages
exclude:
  - "*.sublime-project"
  - "*.sublime-workspace"
  - vendor
  - .asset-cache
  - .bundle
  - .jekyll-assets-cache
  - .sass-cache
  - assets/js/plugins
  - assets/js/_main.js
  - assets/js/vendor
  - Capfile
  - CHANGELOG
  - config
  - Gemfile
  - Gruntfile.js
  - gulpfile.js
  - LICENSE
  - log
  - node_modules
  - package.json
  - package-lock.json
  - Rakefile
  - README
  - tmp
  - /docs
  - /test
keep_files:
  - .git
  - .svn
encoding: "utf-8"
markdown_ext: "markdown,mkdown,mkdn,mkd,md"

# ==============================================================================
# Conversion
# ==============================================================================
markdown: kramdown
highlighter: rouge
lsi: false
excerpt_separator: "\n\n"
incremental: false

kramdown:
  input: GFM
  hard_wrap: false
  auto_ids: true
  footnote_nr: 1
  entity_output: as_char
  toc_levels: 1..6
  smart_quotes: lsquo,rsquo,ldquo,rdquo
  enable_coderay: false
  math_engine: mathjax

# ==============================================================================
# Sass/SCSS
# ==============================================================================
sass:
  sass_dir: _sass
  style: compressed

# ==============================================================================
# Outputting
# ==============================================================================
permalink: /:categories/:title/
paginate: 10
paginate_path: /page:num/
timezone: Asia/Seoul

# ==============================================================================
# Plugins
# ==============================================================================
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

whitelist:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jekyll-include-cache

# ==============================================================================
# Archives (카테고리 / 태그)
# ==============================================================================
category_archive:
  type: liquid
  path: /categories/
tag_archive:
  type: liquid
  path: /tags/

# ==============================================================================
# HTML Compression
# ==============================================================================
compress_html:
  clippings: all
  ignore:
    envs: development

# ==============================================================================
# Defaults (모든 포스트/페이지 기본값)
# ==============================================================================
defaults:
  # _posts
  - scope:
      path: ""
      type: posts
    values:
      layout: single
      author_profile: true
      read_time: true
      comments: # true
      share: true
      related: true
      show_date: true
      toc: true
      toc_sticky: true
      toc_label: "목차"
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: single
      author_profile: true
