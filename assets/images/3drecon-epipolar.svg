<svg viewBox="0 0 860 400" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="ar2" markerWidth="9" markerHeight="9" refX="6" refY="4.5" orient="auto">
      <path d="M0,0 L8,4.5 L0,9 z" fill="#8a9199"/>
    </marker>
  </defs>

  <text x="430" y="30" text-anchor="middle" font-size="16" font-weight="700" fill="#333">두 시점의 epipolar geometry</text>

  <!-- 3D point -->
  <circle cx="430" cy="80" r="6" fill="#b5761a"/>
  <text x="430" y="66" text-anchor="middle" font-size="12.5" font-weight="600" fill="#b5761a">3D 점 X</text>

  <!-- camera centers -->
  <circle cx="150" cy="300" r="7" fill="#2c5aa0"/>
  <text x="150" y="330" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2c5aa0">C (좌 카메라)</text>
  <circle cx="710" cy="300" r="7" fill="#2e7d46"/>
  <text x="710" y="330" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2e7d46">C′ (우 카메라)</text>

  <!-- image planes -->
  <rect x="215" y="150" width="120" height="86" rx="6" fill="#e9f1fb" stroke="#b9d0ec"/>
  <text x="275" y="146" text-anchor="middle" font-size="11.5" fill="#2c5aa0">좌 이미지</text>
  <rect x="525" y="150" width="120" height="86" rx="6" fill="#e6f4ea" stroke="#b7dcc0"/>
  <text x="585" y="146" text-anchor="middle" font-size="11.5" fill="#2e7d46">우 이미지</text>

  <!-- projection rays -->
  <line x1="150" y1="300" x2="430" y2="80" stroke="#8a9199" stroke-width="1.3"/>
  <line x1="710" y1="300" x2="430" y2="80" stroke="#8a9199" stroke-width="1.3"/>
  <!-- baseline -->
  <line x1="150" y1="300" x2="710" y2="300" stroke="#c9ccd1" stroke-dasharray="5 4" stroke-width="1.4"/>
  <text x="430" y="292" text-anchor="middle" font-size="11.5" fill="#6b7178">baseline (두 카메라 중심을 잇는 선)</text>

  <!-- projected points -->
  <circle cx="284" cy="193" r="4.5" fill="#2c5aa0"/>
  <text x="284" y="212" text-anchor="middle" font-size="11" fill="#2c5aa0">x</text>
  <circle cx="576" cy="193" r="4.5" fill="#2e7d46"/>
  <text x="576" y="212" text-anchor="middle" font-size="11" fill="#2e7d46">x′</text>

  <!-- epipolar line on right image -->
  <line x1="533" y1="170" x2="637" y2="216" stroke="#b5761a" stroke-width="1.8"/>
  <text x="585" y="230" text-anchor="middle" font-size="10.5" fill="#b5761a">epipolar line (l′)</text>

  <!-- constraint box -->
  <rect x="250" y="352" width="360" height="34" rx="9" fill="none" stroke="#c9ccd1" stroke-dasharray="5 4"/>
  <text x="430" y="374" text-anchor="middle" font-size="12.5" fill="#333">제약: x′ 는 반드시 x 의 epipolar line 위에 있다  (x′ᵀ F x = 0)</text>
</svg>
