<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 340" font-family="Pretendard, 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow2" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a9199"/>
    </marker>
  </defs>

  <text x="450" y="40" text-anchor="middle" font-size="22" font-weight="700" fill="#333">마커 기반 파이프라인: 2D&#8211;3D 대응 &#8594; PnP</text>

  <!-- Step 1: marker detect -->
  <rect x="30" y="90" width="185" height="150" rx="12" fill="none" stroke="#c9ccd1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="122" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#2c5aa0">① 마커 검출</text>
  <!-- simple apriltag glyph -->
  <rect x="80" y="132" width="84" height="84" fill="#333"/>
  <rect x="92" y="144" width="60" height="60" fill="#fff"/>
  <rect x="104" y="156" width="12" height="12" fill="#333"/>
  <rect x="128" y="156" width="12" height="12" fill="#333"/>
  <rect x="104" y="180" width="36" height="12" fill="#333"/>
  <text x="122" y="234" text-anchor="middle" font-size="12" fill="#6b7178">AprilTag / ArUco</text>

  <!-- Step 2: corners -->
  <rect x="255" y="90" width="185" height="150" rx="12" fill="none" stroke="#c9ccd1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="347" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#2c5aa0">② 코너 대응</text>
  <rect x="312" y="140" width="70" height="70" fill="none" stroke="#5a7fb0" stroke-width="1.5"/>
  <circle cx="312" cy="140" r="5" fill="#fc3a52"/>
  <circle cx="382" cy="140" r="5" fill="#fc3a52"/>
  <circle cx="312" cy="210" r="5" fill="#fc3a52"/>
  <circle cx="382" cy="210" r="5" fill="#fc3a52"/>
  <text x="347" y="232" text-anchor="middle" font-size="12" fill="#6b7178">2D 픽셀 &#8596; 3D 좌표</text>

  <!-- Step 3: PnP -->
  <rect x="480" y="90" width="185" height="150" rx="12" fill="#e9f1fb" stroke="#b9d0ec" stroke-width="1.5"/>
  <text x="572" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#2c5aa0">③ PnP + RANSAC</text>
  <text x="572" y="160" text-anchor="middle" font-size="15" fill="#333">s&#183;p = K[R|t]P</text>
  <text x="572" y="192" text-anchor="middle" font-size="13" fill="#6b7178">대응으로 R, t 풀이</text>
  <text x="572" y="212" text-anchor="middle" font-size="13" fill="#6b7178">(아웃라이어 제거)</text>

  <!-- Step 4: pose -->
  <rect x="705" y="90" width="165" height="150" rx="12" fill="#fbeed6" stroke="#e6cfa0" stroke-width="1.5"/>
  <text x="787" y="118" text-anchor="middle" font-size="15" font-weight="700" fill="#b5761a">④ 6DoF 포즈</text>
  <text x="787" y="168" text-anchor="middle" font-size="20" font-weight="700" fill="#b5761a">T &#8712; SE(3)</text>
  <text x="787" y="200" text-anchor="middle" font-size="13" fill="#c0904a">R, t 획득</text>

  <!-- arrows -->
  <line x1="215" y1="165" x2="253" y2="165" stroke="#8a9199" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <line x1="440" y1="165" x2="478" y2="165" stroke="#8a9199" stroke-width="1.8" marker-end="url(#arrow2)"/>
  <line x1="665" y1="165" x2="703" y2="165" stroke="#8a9199" stroke-width="1.8" marker-end="url(#arrow2)"/>
</svg>
