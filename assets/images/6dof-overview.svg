<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 820 460" font-family="Pretendard, 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a9199"/>
    </marker>
  </defs>

  <text x="410" y="42" text-anchor="middle" font-size="24" font-weight="700" fill="#333">6DoF 포즈 = 위치 3 + 자세 3</text>

  <!-- 위치 pill -->
  <rect x="70" y="80" width="300" height="66" rx="16" fill="#e9f1fb" stroke="#b9d0ec" stroke-width="1.5"/>
  <text x="220" y="112" text-anchor="middle" font-size="21" font-weight="700" fill="#2c5aa0">위치 (Translation)</text>
  <text x="220" y="134" text-anchor="middle" font-size="14" fill="#5a7fb0">3 자유도 · 어디에</text>

  <!-- 자세 pill -->
  <rect x="450" y="80" width="300" height="66" rx="16" fill="#fbeed6" stroke="#e6cfa0" stroke-width="1.5"/>
  <text x="600" y="112" text-anchor="middle" font-size="21" font-weight="700" fill="#b5761a">자세 (Rotation)</text>
  <text x="600" y="134" text-anchor="middle" font-size="14" fill="#c0904a">3 자유도 · 어떤 방향</text>

  <!-- 위치 detail box -->
  <rect x="70" y="176" width="300" height="120" rx="12" fill="none" stroke="#c9ccd1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="220" y="212" text-anchor="middle" font-size="16" fill="#333">x, y, z 이동</text>
  <text x="220" y="244" text-anchor="middle" font-size="26" font-weight="700" fill="#2c5aa0">t = (x, y, z)</text>
  <text x="220" y="274" text-anchor="middle" font-size="13" fill="#6b7178">3D 공간에서의 위치 벡터</text>

  <!-- 자세 detail box -->
  <rect x="450" y="176" width="300" height="120" rx="12" fill="none" stroke="#c9ccd1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="600" y="212" text-anchor="middle" font-size="16" fill="#333">roll, pitch, yaw 회전</text>
  <text x="600" y="244" text-anchor="middle" font-size="24" font-weight="700" fill="#b5761a">R &#8712; SO(3)</text>
  <text x="600" y="274" text-anchor="middle" font-size="13" fill="#6b7178">3&#215;3 회전 행렬</text>

  <!-- arrows down to merge -->
  <line x1="220" y1="296" x2="220" y2="340" stroke="#8a9199" stroke-width="1.8" marker-end="url(#arrow)"/>
  <line x1="600" y1="296" x2="600" y2="340" stroke="#8a9199" stroke-width="1.8" marker-end="url(#arrow)"/>

  <!-- combine box -->
  <rect x="230" y="350" width="360" height="82" rx="14" fill="#eef2f4" stroke="#c9ccd1" stroke-width="1.5"/>
  <text x="410" y="382" text-anchor="middle" font-size="16" fill="#333">강체 변환 (rigid transform)</text>
  <text x="410" y="412" text-anchor="middle" font-size="24" font-weight="700" fill="#333">T &#8712; SE(3)</text>

  <!-- merge diagonal arrows -->
  <line x1="230" y1="360" x2="220" y2="342" stroke="#8a9199" stroke-width="1.2"/>
  <line x1="590" y1="360" x2="600" y2="342" stroke="#8a9199" stroke-width="1.2"/>
</svg>
