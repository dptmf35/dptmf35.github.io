<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 840 360" font-family="Pretendard, 'Malgun Gothic', sans-serif">
  <text x="420" y="34" text-anchor="middle" font-size="21" font-weight="700" fill="#333">Clipped Surrogate Objective의 형태</text>
  <text x="420" y="56" text-anchor="middle" font-size="13" fill="#6b7178">클리핑 구간을 벗어나면 objective가 평탄해져 gradient가 차단된다</text>

  <!-- Panel 1: A > 0 -->
  <rect x="30" y="78" width="370" height="250" rx="12" fill="none" stroke="#c9ccd1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="215" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#2c5aa0">A &gt; 0 (좋은 행동)</text>

  <!-- axes -->
  <line x1="70" y1="290" x2="380" y2="290" stroke="#9aa0a6" stroke-width="1.5"/>
  <line x1="70" y1="290" x2="70" y2="120" stroke="#9aa0a6" stroke-width="1.5"/>
  <text x="384" y="294" font-size="13" fill="#6b7178">r</text>
  <text x="52" y="128" font-size="13" fill="#6b7178">L</text>
  <!-- vertical guides -->
  <line x1="240" y1="290" x2="240" y2="150" stroke="#c9ccd1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="300" y1="290" x2="300" y2="150" stroke="#c9ccd1" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="240" y="308" text-anchor="middle" font-size="12" fill="#6b7178">1</text>
  <text x="300" y="308" text-anchor="middle" font-size="12" fill="#6b7178">1+&#949;</text>
  <!-- curve: rising then flat -->
  <polyline points="90,278 300,150 370,150" fill="none" stroke="#2c5aa0" stroke-width="2.6"/>
  <!-- r=1 dot -->
  <circle cx="240" cy="187" r="5.5" fill="#fc3a52"/>
  <text x="215" y="176" text-anchor="middle" font-size="11" fill="#c0562e">r=1 시작</text>
  <text x="345" y="140" text-anchor="middle" font-size="11" fill="#6b7178">flat</text>

  <!-- Panel 2: A < 0 -->
  <rect x="440" y="78" width="370" height="250" rx="12" fill="none" stroke="#c9ccd1" stroke-width="1.5" stroke-dasharray="5 4"/>
  <text x="625" y="104" text-anchor="middle" font-size="16" font-weight="700" fill="#b5761a">A &lt; 0 (나쁜 행동)</text>

  <!-- axes -->
  <line x1="480" y1="130" x2="790" y2="130" stroke="#9aa0a6" stroke-width="1.5"/>
  <line x1="480" y1="130" x2="480" y2="300" stroke="#9aa0a6" stroke-width="1.5"/>
  <text x="794" y="134" font-size="13" fill="#6b7178">r</text>
  <text x="462" y="300" font-size="13" fill="#6b7178">L</text>
  <!-- vertical guides -->
  <line x1="600" y1="130" x2="600" y2="290" stroke="#c9ccd1" stroke-width="1" stroke-dasharray="3 3"/>
  <line x1="660" y1="130" x2="660" y2="290" stroke="#c9ccd1" stroke-width="1" stroke-dasharray="3 3"/>
  <text x="600" y="308" text-anchor="middle" font-size="12" fill="#6b7178">1&#8722;&#949;</text>
  <text x="660" y="308" text-anchor="middle" font-size="12" fill="#6b7178">1</text>
  <!-- curve: flat then falling -->
  <polyline points="500,172 600,172 780,272" fill="none" stroke="#b5761a" stroke-width="2.6"/>
  <!-- r=1 dot -->
  <circle cx="660" cy="205" r="5.5" fill="#fc3a52"/>
  <text x="690" y="200" text-anchor="middle" font-size="11" fill="#c0562e">r=1 시작</text>
  <text x="545" y="162" text-anchor="middle" font-size="11" fill="#6b7178">flat</text>
</svg>
