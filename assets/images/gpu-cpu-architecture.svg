<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 440" font-family="Pretendard, 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="gc-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a9199"/>
    </marker>
  </defs>

  <!-- CPU side -->
  <rect x="35" y="54" width="150" height="32" rx="16" fill="#e9f1fb" stroke="#b9d0ec"/>
  <text x="110" y="75" text-anchor="middle" font-size="14" fill="#2c5aa0" font-weight="600">CPU + DRAM</text>
  <rect x="10" y="100" width="200" height="240" rx="12" fill="none" stroke="#c9ccd1" stroke-dasharray="5 4"/>
  <text x="110" y="140" text-anchor="middle" font-size="14" font-weight="600" fill="#333">CPU</text>
  <text x="110" y="162" text-anchor="middle" font-size="11.5" fill="#6b7178">소수의 강력한 코어</text>
  <text x="110" y="179" text-anchor="middle" font-size="11.5" fill="#6b7178">복잡한 로직 · 순차 처리</text>
  <text x="110" y="230" text-anchor="middle" font-size="14" font-weight="600" fill="#333">DRAM (system RAM)</text>
  <text x="110" y="252" text-anchor="middle" font-size="11.5" fill="#6b7178">데이터가 처음 로드되는 곳</text>
  <text x="110" y="269" text-anchor="middle" font-size="11.5" fill="#6b7178">수십~수백 GB</text>

  <!-- PCIe -->
  <line x1="212" y1="220" x2="298" y2="220" stroke="#8a9199" stroke-width="2.5" marker-end="url(#gc-arrow)"/>
  <text x="255" y="205" text-anchor="middle" font-size="12.5" font-weight="600" fill="#555">PCIe bus</text>
  <text x="255" y="240" text-anchor="middle" font-size="11" fill="#6b7178">~수십 GB/s</text>

  <!-- GPU -->
  <rect x="600" y="14" width="100" height="32" rx="16" fill="#fbeed6" stroke="#e6cfa0"/>
  <text x="650" y="35" text-anchor="middle" font-size="14" fill="#b5761a" font-weight="600">GPU</text>
  <rect x="305" y="60" width="685" height="320" rx="12" fill="none" stroke="#c9ccd1" stroke-dasharray="5 4"/>

  <!-- HBM -->
  <rect x="330" y="80" width="635" height="58" rx="10" fill="#e6f4ea" stroke="#b7dcc0"/>
  <text x="647" y="104" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d46">HBM (VRAM) — 중앙 창고</text>
  <text x="647" y="126" text-anchor="middle" font-size="11.5" fill="#2e7d46">모델 파라미터·데이터 전부 보관 · 40~80 GB · 1.5~2.0 TB/s (A100)</text>

  <!-- arrows HBM -> SMs -->
  <line x1="422" y1="140" x2="422" y2="168" stroke="#8a9199" stroke-width="1.8" marker-end="url(#gc-arrow)"/>
  <line x1="647" y1="140" x2="647" y2="168" stroke="#8a9199" stroke-width="1.8" marker-end="url(#gc-arrow)"/>
  <line x1="872" y1="140" x2="872" y2="168" stroke="#8a9199" stroke-width="1.8" marker-end="url(#gc-arrow)"/>
  <text x="647" y="160" text-anchor="middle" font-size="10.5" fill="#6b7178"></text>

  <!-- SMs -->
  <g>
    <rect x="330" y="172" width="185" height="158" rx="10" fill="#fff" stroke="#c9ccd1"/>
    <text x="422" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#333">SM #1</text>
    <rect x="345" y="204" width="155" height="40" rx="8" fill="#e9f1fb" stroke="#b9d0ec"/>
    <text x="422" y="221" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2c5aa0">SRAM 192 KB</text>
    <text x="422" y="237" text-anchor="middle" font-size="10.5" fill="#2c5aa0">~19 TB/s — 소형 창고</text>
    <text x="422" y="268" text-anchor="middle" font-size="11.5" fill="#333">CUDA core · Tensor core</text>
    <text x="422" y="290" text-anchor="middle" font-size="11.5" fill="#333">register (작업대)</text>
    <text x="422" y="312" text-anchor="middle" font-size="10.5" fill="#6b7178">가장 빠르고 가장 작다</text>
  </g>
  <g>
    <rect x="555" y="172" width="185" height="158" rx="10" fill="#fff" stroke="#c9ccd1"/>
    <text x="647" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#333">SM #2</text>
    <rect x="570" y="204" width="155" height="40" rx="8" fill="#e9f1fb" stroke="#b9d0ec"/>
    <text x="647" y="221" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2c5aa0">SRAM 192 KB</text>
    <text x="647" y="237" text-anchor="middle" font-size="10.5" fill="#2c5aa0">~19 TB/s — 소형 창고</text>
    <text x="647" y="268" text-anchor="middle" font-size="11.5" fill="#333">CUDA core · Tensor core</text>
    <text x="647" y="290" text-anchor="middle" font-size="11.5" fill="#333">register (작업대)</text>
    <text x="647" y="312" text-anchor="middle" font-size="10.5" fill="#6b7178">가장 빠르고 가장 작다</text>
  </g>
  <g>
    <rect x="780" y="172" width="185" height="158" rx="10" fill="#fff" stroke="#c9ccd1"/>
    <text x="872" y="194" text-anchor="middle" font-size="13" font-weight="600" fill="#333">… SM #108</text>
    <rect x="795" y="204" width="155" height="40" rx="8" fill="#e9f1fb" stroke="#b9d0ec"/>
    <text x="872" y="221" text-anchor="middle" font-size="11.5" font-weight="600" fill="#2c5aa0">SRAM 192 KB</text>
    <text x="872" y="237" text-anchor="middle" font-size="10.5" fill="#2c5aa0">~19 TB/s — 소형 창고</text>
    <text x="872" y="268" text-anchor="middle" font-size="11.5" fill="#333">CUDA core · Tensor core</text>
    <text x="872" y="290" text-anchor="middle" font-size="11.5" fill="#333">register (작업대)</text>
    <text x="872" y="312" text-anchor="middle" font-size="10.5" fill="#6b7178">가장 빠르고 가장 작다</text>
  </g>

  <text x="647" y="358" text-anchor="middle" font-size="11.5" fill="#6b7178">scheduler가 SM들에 작업을 할당하고, 각 SM은 HBM에서 블록을 SRAM으로 가져와 연산 후 결과만 HBM에 되돌린다</text>

  <text x="500" y="420" text-anchor="middle" font-size="13" fill="#6b7178">CPU가 준비한 데이터가 PCIe로 HBM에 오르고, 수천 개 코어가 SRAM 위에서 병렬로 일한다 — 병목은 대개 HBM↔SRAM 사이에 있다</text>
</svg>
