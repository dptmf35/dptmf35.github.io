<svg viewBox="0 0 860 340" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="ar3" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#8a9199"/>
    </marker>
  </defs>

  <!-- stage 1: raw -->
  <rect x="20" y="40" width="230" height="220" rx="12" fill="#e9f1fb" stroke="#b9d0ec"/>
  <text x="135" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#2c5aa0">원본 point cloud</text>
  <!-- dense cluster dots -->
  <g fill="#2c5aa0">
    <circle cx="90" cy="110" r="2.6"/><circle cx="104" cy="118" r="2.6"/><circle cx="118" cy="106" r="2.6"/>
    <circle cx="132" cy="122" r="2.6"/><circle cx="146" cy="112" r="2.6"/><circle cx="160" cy="126" r="2.6"/>
    <circle cx="98" cy="140" r="2.6"/><circle cx="120" cy="146" r="2.6"/><circle cx="142" cy="138" r="2.6"/>
    <circle cx="112" cy="162" r="2.6"/><circle cx="134" cy="168" r="2.6"/><circle cx="156" cy="156" r="2.6"/>
    <circle cx="128" cy="188" r="2.6"/><circle cx="150" cy="182" r="2.6"/><circle cx="106" cy="184" r="2.6"/>
  </g>
  <!-- outliers (red) -->
  <g fill="#c0392b">
    <circle cx="55" cy="80" r="3"/><circle cx="210" cy="95" r="3"/><circle cx="60" cy="230" r="3"/><circle cx="205" cy="220" r="3"/>
  </g>
  <text x="135" y="288" text-anchor="middle" font-size="11.5" fill="#6b7178">밀집 + outlier(빨강)</text>

  <path d="M258,150 L318,150" stroke="#8a9199" fill="none" stroke-width="1.6" marker-end="url(#ar3)"/>
  <text x="288" y="140" text-anchor="middle" font-size="11" fill="#6b7178">노이즈 제거</text>

  <!-- stage 2: denoised -->
  <rect x="326" y="40" width="200" height="220" rx="12" fill="#e6f4ea" stroke="#b7dcc0"/>
  <text x="426" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#2e7d46">outlier 제거</text>
  <g fill="#2e7d46">
    <circle cx="386" cy="110" r="2.6"/><circle cx="400" cy="118" r="2.6"/><circle cx="414" cy="106" r="2.6"/>
    <circle cx="428" cy="122" r="2.6"/><circle cx="442" cy="112" r="2.6"/><circle cx="456" cy="126" r="2.6"/>
    <circle cx="394" cy="140" r="2.6"/><circle cx="416" cy="146" r="2.6"/><circle cx="438" cy="138" r="2.6"/>
    <circle cx="408" cy="162" r="2.6"/><circle cx="430" cy="168" r="2.6"/><circle cx="452" cy="156" r="2.6"/>
    <circle cx="424" cy="188" r="2.6"/><circle cx="446" cy="182" r="2.6"/><circle cx="402" cy="184" r="2.6"/>
  </g>
  <text x="426" y="288" text-anchor="middle" font-size="11.5" fill="#6b7178">통계적/반경 기반 제거</text>

  <path d="M534,150 L594,150" stroke="#8a9199" fill="none" stroke-width="1.6" marker-end="url(#ar3)"/>
  <text x="564" y="140" text-anchor="middle" font-size="11" fill="#6b7178">downsampling</text>

  <!-- stage 3: downsampled -->
  <rect x="602" y="40" width="238" height="220" rx="12" fill="#fbeed6" stroke="#e6cfa0"/>
  <text x="721" y="66" text-anchor="middle" font-size="14" font-weight="700" fill="#b5761a">voxel downsample</text>
  <!-- voxel grid -->
  <g stroke="#e6cfa0" stroke-width="1">
    <line x1="642" y1="92" x2="800" y2="92"/><line x1="642" y1="132" x2="800" y2="132"/>
    <line x1="642" y1="172" x2="800" y2="172"/><line x1="642" y1="212" x2="800" y2="212"/>
    <line x1="642" y1="92" x2="642" y2="212"/><line x1="682" y1="92" x2="682" y2="212"/>
    <line x1="722" y1="92" x2="722" y2="212"/><line x1="762" y1="92" x2="762" y2="212"/><line x1="800" y1="92" x2="800" y2="212"/>
  </g>
  <!-- one point per occupied voxel -->
  <g fill="#b5761a">
    <circle cx="702" cy="112" r="3.2"/><circle cx="742" cy="112" r="3.2"/>
    <circle cx="662" cy="152" r="3.2"/><circle cx="702" cy="152" r="3.2"/><circle cx="742" cy="152" r="3.2"/>
    <circle cx="702" cy="192" r="3.2"/><circle cx="742" cy="192" r="3.2"/>
  </g>
  <text x="721" y="288" text-anchor="middle" font-size="11.5" fill="#6b7178">voxel당 대표점 1개 → 균일·경량</text>
</svg>
