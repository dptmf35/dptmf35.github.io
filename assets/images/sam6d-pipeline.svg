<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 300" font-family="Pretendard, 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="s6-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a9199"/>
    </marker>
  </defs>

  <!-- input -->
  <rect x="10" y="80" width="145" height="130" rx="12" fill="none" stroke="#c9ccd1" stroke-dasharray="5 4"/>
  <text x="82" y="118" text-anchor="middle" font-size="14" font-weight="600" fill="#333">입력</text>
  <text x="82" y="144" text-anchor="middle" font-size="12.5" fill="#333">RGB-D 이미지</text>
  <text x="82" y="166" text-anchor="middle" font-size="12.5" fill="#333">물체 CAD 모델</text>
  <text x="82" y="188" text-anchor="middle" font-size="11.5" fill="#6b7178">→ template 렌더링</text>
  <line x1="155" y1="145" x2="173" y2="145" stroke="#8a9199" stroke-width="2" marker-end="url(#s6-arrow)"/>

  <!-- ISM -->
  <rect x="225" y="24" width="240" height="32" rx="16" fill="#e9f1fb" stroke="#b9d0ec"/>
  <text x="345" y="45" text-anchor="middle" font-size="14" fill="#2c5aa0" font-weight="600">ISM — Instance Segmentation</text>
  <rect x="177" y="80" width="335" height="130" rx="12" fill="none" stroke="#c9ccd1" stroke-dasharray="5 4"/>
  <text x="344" y="112" text-anchor="middle" font-size="13" fill="#333">SAM으로 class-agnostic proposal 생성</text>
  <text x="344" y="140" text-anchor="middle" font-size="13" fill="#333">object matching score로 필터링</text>
  <text x="344" y="164" text-anchor="middle" font-size="12" fill="#6b7178">semantic · appearance · geometric</text>
  <text x="344" y="192" text-anchor="middle" font-size="12.5" font-weight="600" fill="#2c5aa0">→ novel object instance mask</text>
  <line x1="512" y1="145" x2="530" y2="145" stroke="#8a9199" stroke-width="2" marker-end="url(#s6-arrow)"/>

  <!-- PEM -->
  <rect x="580" y="24" width="230" height="32" rx="16" fill="#fbeed6" stroke="#e6cfa0"/>
  <text x="695" y="45" text-anchor="middle" font-size="14" fill="#b5761a" font-weight="600">PEM — Pose Estimation</text>
  <rect x="534" y="80" width="330" height="130" rx="12" fill="none" stroke="#c9ccd1" stroke-dasharray="5 4"/>
  <text x="699" y="110" text-anchor="middle" font-size="13" fill="#333">background token + point matching</text>
  <text x="699" y="136" text-anchor="middle" font-size="13" fill="#333">Coarse(196점) → Fine(2048점, SDPT)</text>
  <text x="699" y="162" text-anchor="middle" font-size="12" fill="#6b7178">soft assignment → 대응쌍 추출</text>
  <text x="699" y="190" text-anchor="middle" font-size="12.5" font-weight="600" fill="#b5761a">→ weighted SVD</text>
  <line x1="864" y1="145" x2="882" y2="145" stroke="#8a9199" stroke-width="2" marker-end="url(#s6-arrow)"/>

  <!-- output -->
  <rect x="886" y="108" width="104" height="74" rx="12" fill="#e6f4ea" stroke="#b7dcc0"/>
  <text x="938" y="140" text-anchor="middle" font-size="16" font-weight="700" fill="#2e7d46">(R, t)</text>
  <text x="938" y="163" text-anchor="middle" font-size="12" fill="#2e7d46">6D pose</text>

  <text x="500" y="262" text-anchor="middle" font-size="13" fill="#6b7178">학습에 없던 novel object를 두 단계로 처리한다 — ISM이 어디 있는지, PEM이 어떤 자세인지</text>
</svg>
