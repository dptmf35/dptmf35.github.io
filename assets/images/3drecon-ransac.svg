<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 990 340" font-family="Pretendard, 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="rs-arrow" markerWidth="10" markerHeight="10" refX="7" refY="3" orient="auto">
      <path d="M0,0 L7,3 L0,6 Z" fill="#8a9199"/>
    </marker>
  </defs>

  <!-- Panel 1: 최소 표본 샘플 -->
  <g transform="translate(10,0)">
    <rect x="60" y="12" width="180" height="32" rx="16" fill="#e9f1fb" stroke="#b9d0ec"/>
    <text x="150" y="33" text-anchor="middle" font-size="15" fill="#2c5aa0" font-weight="600">① 최소 표본 샘플</text>
    <rect x="6" y="54" width="288" height="240" rx="12" fill="none" stroke="#c9ccd1" stroke-dasharray="5 4"/>
    <line x1="15" y1="248" x2="285" y2="88" stroke="#2c5aa0" stroke-width="1.6" opacity="0.7"/>
    <!-- non-sample points -->
    <g fill="#b9c0c7">
      <circle cx="25" cy="232" r="4.5"/><circle cx="80" cy="201" r="4.5"/><circle cx="110" cy="193" r="4.5"/>
      <circle cx="140" cy="176" r="4.5"/><circle cx="170" cy="152" r="4.5"/><circle cx="200" cy="143" r="4.5"/>
      <circle cx="255" cy="113" r="4.5"/><circle cx="275" cy="96" r="4.5"/>
      <circle cx="60" cy="120" r="4.5"/><circle cx="120" cy="90" r="4.5"/><circle cx="210" cy="210" r="4.5"/>
      <circle cx="160" cy="240" r="4.5"/><circle cx="90" cy="160" r="4.5"/><circle cx="250" cy="180" r="4.5"/>
    </g>
    <!-- sampled points -->
    <circle cx="55" cy="224" r="6.5" fill="#e9f1fb" stroke="#2c5aa0" stroke-width="2.5"/>
    <circle cx="230" cy="120" r="6.5" fill="#e9f1fb" stroke="#2c5aa0" stroke-width="2.5"/>
    <text x="150" y="282" text-anchor="middle" font-size="12" fill="#6b7178">무작위 s쌍으로 모델 계산</text>
  </g>

  <line x1="306" y1="172" x2="332" y2="172" stroke="#8a9199" stroke-width="2" marker-end="url(#rs-arrow)"/>

  <!-- Panel 2: inlier 세기 -->
  <g transform="translate(340,0)">
    <rect x="60" y="12" width="180" height="32" rx="16" fill="#fbeed6" stroke="#e6cfa0"/>
    <text x="150" y="33" text-anchor="middle" font-size="15" fill="#b5761a" font-weight="600">② inlier 세기</text>
    <rect x="6" y="54" width="288" height="240" rx="12" fill="none" stroke="#c9ccd1" stroke-dasharray="5 4"/>
    <line x1="15" y1="248" x2="285" y2="88" stroke="#2c5aa0" stroke-width="1.6" opacity="0.7"/>
    <line x1="15" y1="234" x2="285" y2="74" stroke="#e6a23c" stroke-width="1.3" stroke-dasharray="6 4"/>
    <line x1="15" y1="262" x2="285" y2="102" stroke="#e6a23c" stroke-width="1.3" stroke-dasharray="6 4"/>
    <text x="272" y="68" font-size="13" fill="#b5761a">±τ</text>
    <!-- inliers (within band) -->
    <g fill="#2c5aa0">
      <circle cx="25" cy="232" r="4.5"/><circle cx="55" cy="224" r="4.5"/><circle cx="80" cy="201" r="4.5"/>
      <circle cx="110" cy="193" r="4.5"/><circle cx="140" cy="176" r="4.5"/><circle cx="170" cy="152" r="4.5"/>
      <circle cx="200" cy="143" r="4.5"/><circle cx="230" cy="120" r="4.5"/><circle cx="255" cy="113" r="4.5"/>
      <circle cx="275" cy="96" r="4.5"/>
    </g>
    <!-- outliers -->
    <g fill="#d5d8dd">
      <circle cx="60" cy="120" r="4.5"/><circle cx="120" cy="90" r="4.5"/><circle cx="210" cy="210" r="4.5"/>
      <circle cx="160" cy="240" r="4.5"/><circle cx="90" cy="160" r="4.5"/><circle cx="250" cy="180" r="4.5"/>
    </g>
    <text x="150" y="282" text-anchor="middle" font-size="12" fill="#6b7178">오차 &lt; τ 인 대응 수: inlier 10 / 16</text>
  </g>

  <line x1="636" y1="172" x2="662" y2="172" stroke="#8a9199" stroke-width="2" marker-end="url(#rs-arrow)"/>

  <!-- Panel 3: 최선 모델 채택 -->
  <g transform="translate(670,0)">
    <rect x="60" y="12" width="180" height="32" rx="16" fill="#e6f4ea" stroke="#b7dcc0"/>
    <text x="150" y="33" text-anchor="middle" font-size="15" fill="#2e7d46" font-weight="600">③ 최선 모델 채택</text>
    <rect x="6" y="54" width="288" height="240" rx="12" fill="none" stroke="#c9ccd1" stroke-dasharray="5 4"/>
    <line x1="15" y1="248" x2="285" y2="88" stroke="#2e7d46" stroke-width="2.2"/>
    <g fill="#2e7d46">
      <circle cx="25" cy="232" r="4.5"/><circle cx="55" cy="224" r="4.5"/><circle cx="80" cy="201" r="4.5"/>
      <circle cx="110" cy="193" r="4.5"/><circle cx="140" cy="176" r="4.5"/><circle cx="170" cy="152" r="4.5"/>
      <circle cx="200" cy="143" r="4.5"/><circle cx="230" cy="120" r="4.5"/><circle cx="255" cy="113" r="4.5"/>
      <circle cx="275" cy="96" r="4.5"/>
    </g>
    <g fill="#e4e6e9">
      <circle cx="60" cy="120" r="4.5"/><circle cx="120" cy="90" r="4.5"/><circle cx="210" cy="210" r="4.5"/>
      <circle cx="160" cy="240" r="4.5"/><circle cx="90" cy="160" r="4.5"/><circle cx="250" cy="180" r="4.5"/>
    </g>
    <text x="150" y="282" text-anchor="middle" font-size="12" fill="#6b7178">inlier 전체로 모델 재추정</text>
  </g>

  <text x="495" y="326" text-anchor="middle" font-size="13" fill="#6b7178">N번 반복해 inlier가 가장 많은 모델을 채택한다 — outlier는 처음부터 모델에 손대지 못한다</text>
</svg>
