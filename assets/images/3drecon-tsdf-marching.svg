<svg viewBox="0 0 860 360" xmlns="http://www.w3.org/2000/svg" font-family="Pretendard, 'Malgun Gothic', sans-serif">
  <defs>
    <marker id="ar4" markerWidth="10" markerHeight="10" refX="7" refY="5" orient="auto">
      <path d="M0,0 L9,5 L0,10 z" fill="#8a9199"/>
    </marker>
  </defs>

  <!-- left: TSDF grid -->
  <rect x="24" y="40" width="330" height="286" rx="12" fill="#e9f1fb" stroke="#b9d0ec"/>
  <text x="189" y="66" text-anchor="middle" font-size="15" font-weight="700" fill="#2c5aa0">TSDF voxel grid</text>

  <!-- grid -->
  <g stroke="#b9d0ec" stroke-width="1">
    <line x1="60" y1="90" x2="320" y2="90"/><line x1="60" y1="132" x2="320" y2="132"/>
    <line x1="60" y1="174" x2="320" y2="174"/><line x1="60" y1="216" x2="320" y2="216"/><line x1="60" y1="258" x2="320" y2="258"/>
    <line x1="60" y1="90" x2="60" y2="258"/><line x1="112" y1="90" x2="112" y2="258"/>
    <line x1="164" y1="90" x2="164" y2="258"/><line x1="216" y1="90" x2="216" y2="258"/>
    <line x1="268" y1="90" x2="268" y2="258"/><line x1="320" y1="90" x2="320" y2="258"/>
  </g>

  <!-- signed values: negative(inside, blue) / positive(outside, orange) -->
  <g font-size="11" text-anchor="middle">
    <text x="86" y="115" fill="#b5761a">+.8</text><text x="138" y="115" fill="#b5761a">+.5</text><text x="190" y="115" fill="#b5761a">+.3</text><text x="242" y="115" fill="#b5761a">+.6</text><text x="294" y="115" fill="#b5761a">+.9</text>
    <text x="86" y="157" fill="#b5761a">+.4</text><text x="138" y="157" fill="#2c5aa0">−.1</text><text x="190" y="157" fill="#2c5aa0">−.3</text><text x="242" y="157" fill="#2c5aa0">−.1</text><text x="294" y="157" fill="#b5761a">+.5</text>
    <text x="86" y="199" fill="#2c5aa0">−.2</text><text x="138" y="199" fill="#2c5aa0">−.6</text><text x="190" y="199" fill="#2c5aa0">−.8</text><text x="242" y="199" fill="#2c5aa0">−.5</text><text x="294" y="199" fill="#2c5aa0">−.2</text>
    <text x="86" y="241" fill="#b5761a">+.3</text><text x="138" y="241" fill="#2c5aa0">−.2</text><text x="190" y="241" fill="#2c5aa0">−.4</text><text x="242" y="241" fill="#2c5aa0">−.1</text><text x="294" y="241" fill="#b5761a">+.4</text>
  </g>

  <!-- zero-crossing surface curve -->
  <path d="M60,150 Q150,120 210,150 T320,150" fill="none" stroke="#2e7d46" stroke-width="2.5"/>
  <text x="189" y="292" text-anchor="middle" font-size="11.5" fill="#6b7178">각 voxel에 표면까지의 부호 거리 저장 (− 내부 / + 외부)</text>
  <text x="189" y="310" text-anchor="middle" font-size="11.5" fill="#2e7d46">표면 = 값이 0을 지나는 곳(zero-crossing)</text>

  <!-- arrow -->
  <path d="M362,183 L432,183" stroke="#8a9199" fill="none" stroke-width="1.8" marker-end="url(#ar4)"/>
  <text x="397" y="172" text-anchor="middle" font-size="12" font-weight="600" fill="#333">Marching Cubes</text>
  <text x="397" y="205" text-anchor="middle" font-size="10.5" fill="#6b7178">부호 패턴 →</text>
  <text x="397" y="219" text-anchor="middle" font-size="10.5" fill="#6b7178">삼각형 조합</text>

  <!-- right: mesh -->
  <rect x="440" y="40" width="396" height="286" rx="12" fill="#e6f4ea" stroke="#b7dcc0"/>
  <text x="638" y="66" text-anchor="middle" font-size="15" font-weight="700" fill="#2e7d46">mesh (삼각형 표면)</text>

  <!-- triangle mesh over a blobby surface -->
  <g stroke="#2e7d46" stroke-width="1.3" fill="#d6ecdd">
    <polygon points="500,180 560,120 590,190"/>
    <polygon points="590,190 560,120 640,130"/>
    <polygon points="590,190 640,130 660,200"/>
    <polygon points="660,200 640,130 720,140"/>
    <polygon points="660,200 720,140 740,210"/>
    <polygon points="500,180 590,190 540,240"/>
    <polygon points="590,190 660,200 620,250"/>
    <polygon points="540,240 590,190 620,250"/>
    <polygon points="660,200 740,210 700,255"/>
    <polygon points="620,250 660,200 700,255"/>
  </g>
  <text x="638" y="300" text-anchor="middle" font-size="11.5" fill="#6b7178">voxel grid → 연속 삼각형 표면으로 추출</text>
</svg>
